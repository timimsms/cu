name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.22', '1.23', '1.24']
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}
    
    - name: Get dependencies
      run: go mod download
    
    - name: Setup problem matcher
      run: echo "::add-matcher::.github/problem-matchers/go-test.json"
    
    - name: Run tests with JSON output
      run: |
        go test -v -race -coverprofile coverage.txt -covermode atomic -json ./... > test-results.json || true
        
    - name: Generate test report
      if: always()
      run: |
        go install github.com/jstemmer/go-junit-report/v2@latest
        cat test-results.json | go-junit-report -parser gojson > test-results.xml
    
    - name: Create test summary
      if: always()
      run: |
        # Run the custom test summary script
        bash .github/scripts/test-summary.sh test-results.json || true
        
        # Also run gotestsum for additional output
        go install gotest.tools/gotestsum@latest
        gotestsum --jsonfile test-results.json --format dots-v2 || true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-go${{ matrix.go }}
        path: |
          test-results.json
          test-results.xml
    
    - name: Publish test results
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results (${{ matrix.os }} - Go ${{ matrix.go }})
        path: test-results.xml
        reporter: java-junit
        fail-on-error: false
        
    - name: Comment PR with test results
      if: always() && github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs').promises;
          try {
            const summary = await fs.readFile(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            const comment = `### Test Results for ${{ matrix.os }} - Go ${{ matrix.go }}\n\n${summary}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not read test summary:', error);
          }
    
    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests
        fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Build binary
      run: go build -v ./cmd/cu
    
    - name: Test binary
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          ./cu.exe --version
        else
          ./cu --version
        fi
      shell: bash

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Run gosec
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        gosec -fmt sarif -out gosec-results.sarif -timeout 300s ./...
    
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: gosec-results.sarif

  docs-test:
    name: Test Documentation Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install MkDocs and theme
      run: |
        pip install mkdocs-material
        
    - name: Test documentation build
      run: mkdocs build --strict --site-dir _test_site